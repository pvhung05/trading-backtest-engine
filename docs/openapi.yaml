openapi: 3.0.3
info:
  title: Backtest Trading API
  version: 1.0.0
  description: API cho auth JWT và market module của hệ thống backtest trading.
servers:
  - url: http://localhost:8081
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      summary: Đăng ký user mới và nhận JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: hungpham
              email: hung@example.com
              password: strongpassword123
      responses:
        '201':
          description: Tạo user thành công và trả token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validate lỗi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username hoặc email đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      summary: Đăng nhập và nhận JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: hungpham
              password: strongpassword123
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validate lỗi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Sai thông tin đăng nhập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/me:
    get:
      summary: Lấy thông tin user hiện tại từ JWT
      responses:
        '200':
          description: Thông tin user hiện tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Thiếu hoặc sai JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/market/load:
    get:
      summary: Tải dữ liệu bar cho symbol/timeframe trong khoảng thời gian
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: Mã cặp (ví dụ BTCUSDT)
        - name: timeframe
          in: query
          required: true
          schema:
            type: string
          description: Timeframe (ví dụ 5m, 1h)
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Thời điểm bắt đầu (ISO-8601)
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Thời điểm kết thúc (ISO-8601)
      responses:
        '200':
          description: Danh sách bars trả về
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDataResponse'
        '400':
          description: Bad request (validation lỗi)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Lỗi provider / upstream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/market/cache:
    get:
      summary: Xem tổng quan cache hiện có
      responses:
        '200':
          description: Thông tin cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketCacheResponse'
    delete:
      summary: Xóa toàn bộ cache
      responses:
        '204':
          description: Cache đã được xóa thành công (No Content)
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/backtest/trading-records:
    post:
      summary: Chạy backtest và trả về chuỗi trading record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestTradingRecordRequest'
      responses:
        '200':
          description: Trading record của backtest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestTradingRecordResponse'
        '400':
          description: Validate lỗi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/execution/executed-trades:
    post:
      summary: Thực thi mô phỏng và trả về danh sách executed trades
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionSimulationRequest'
      responses:
        '200':
          description: Danh sách executed trades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionSimulationResponse'
        '400':
          description: Validate lỗi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/portfolio/simulate:
    post:
      summary: Chạy mô phỏng portfolio hoàn chỉnh với equity curve theo từng candle
      description: |
        Pipeline đầy đủ:
        1. Tải dữ liệu thị trường và chạy backtest với chiến lược được chỉ định
        2. Mô phỏng execution với commission, slippage và kích thước vị thế
        3. Tính equity curve mark-to-market tại MỖI candle bar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortfolioSimulationRequest'
            example:
              symbol: BTCUSDT
              timeframe: 1h
              startTime: "2024-01-01T00:00:00Z"
              endTime: "2024-06-01T00:00:00Z"
              strategyType: SMA_CROSS
              shortPeriod: 10
              longPeriod: 30
              commissionRate: 0.001
              slippageRate: 0.0005
              positionSizePercent: 10.0
              capital: 10000.0
      responses:
        '200':
          description: Kết quả mô phỏng portfolio đầy đủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioSimulationResponse'
        '400':
          description: Validate lỗi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Lỗi provider upstream (market data)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/metrics/calculate:
    post:
      summary: Tính toán toàn bộ performance metrics từ executed trades và equity curve
      description: |
        Nhận danh sách executed trades và equity curve để tính:
        - Trading metrics: win rate, profit factor, expectancy, ...
        - Portfolio metrics: max drawdown, Sharpe, Sortino, Calmar, CAGR, ...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsSimulationRequest'
            example:
              trades:
                - entryTime: "2025-01-01T00:00:00Z"
                  exitTime: "2025-01-02T00:00:00Z"
                  entryPrice: 100.0
                  exitPrice: 110.0
                  quantity: 1.0
                  grossProfit: 10.0
                  commission: 0.1
                  slippageCost: 0.05
                  netProfit: 9.85
              equityCurve:
                points:
                  - timestamp: "2025-01-01T00:00:00Z"
                    equity: 10000.0
                    openPosition: false
                    openPositionPnl: 0.0
                  - timestamp: "2025-01-02T00:00:00Z"
                    equity: 10009.85
                    openPosition: true
                    openPositionPnl: 9.85
              stats:
                initialCapital: 10000.0
                finalEquity: 10009.85
                totalReturn: 9.85
                totalReturnPercent: 0.0985
                tradeCount: 1
      responses:
        '200':
          description: Kết quả metrics đầy đủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSimulationResponse'
        '400':
          description: Validate lỗi hoặc dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72
      required: [username, email, password]
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [USER, ADMIN]
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, role, enabled, createdAt]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      required: [token, tokenType, user]
    MarketBarResponse:
      type: object
      properties:
        endTime:
          type: string
          format: date-time
        open:
          type: number
          format: double
        high:
          type: number
          format: double
        low:
          type: number
          format: double
        close:
          type: number
          format: double
        volume:
          type: number
          format: double
      required: [endTime, open, high, low, close, volume]
    MarketDataResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        barCount:
          type: integer
        bars:
          type: array
          items:
            $ref: '#/components/schemas/MarketBarResponse'
      required: [symbol, timeframe, startTime, endTime, barCount, bars]
    MarketCacheEntryResponse:
      type: object
      properties:
        cacheKey:
          type: string
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        barCount:
          type: integer
      required: [cacheKey, symbol, timeframe, startTime, endTime, barCount]
    MarketCacheResponse:
      type: object
      properties:
        cacheSize:
          type: integer
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MarketCacheEntryResponse'
      required: [cacheSize, entries]
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
    BacktestTradingRecordRequest:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
        shortPeriod:
          type: integer
        longPeriod:
          type: integer
        signalPeriod:
          type: integer
        period:
          type: integer
        overbought:
          type: number
          format: double
        oversold:
          type: number
          format: double
      required: [symbol, timeframe, startTime, strategyType]
    BacktestTradeResponse:
      type: object
      properties:
        entryTime:
          type: string
          format: date-time
        entryPrice:
          type: number
          format: double
        exitTime:
          type: string
          format: date-time
        exitPrice:
          type: number
          format: double
        profitPercent:
          type: number
          format: double
      required: [entryTime, entryPrice, exitTime, exitPrice, profitPercent]
    BacktestTradingRecordResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
        tradeCount:
          type: integer
        trades:
          type: array
          items:
            $ref: '#/components/schemas/BacktestTradeResponse'
      required: [symbol, timeframe, startTime, strategyType, tradeCount, trades]
    ExecutionSimulationRequest:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
        shortPeriod:
          type: integer
        longPeriod:
          type: integer
        signalPeriod:
          type: integer
        period:
          type: integer
        overbought:
          type: number
          format: double
        oversold:
          type: number
          format: double
        commissionRate:
          type: number
          format: double
        slippageRate:
          type: number
          format: double
        positionSizePercent:
          type: number
          format: double
        capital:
          type: number
          format: double
      required: [symbol, timeframe, startTime, strategyType, positionSizePercent, capital]
    ExecutedTradeResponse:
      type: object
      properties:
        entryTime:
          type: string
          format: date-time
        exitTime:
          type: string
          format: date-time
        entryPrice:
          type: number
          format: double
        exitPrice:
          type: number
          format: double
        quantity:
          type: number
          format: double
        grossProfit:
          type: number
          format: double
        commission:
          type: number
          format: double
        slippageCost:
          type: number
          format: double
        netProfit:
          type: number
          format: double
      required: [entryTime, exitTime, entryPrice, exitPrice, quantity]
    ExecutionSimulationResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
        capital:
          type: number
          format: double
        commissionRate:
          type: number
          format: double
        slippageRate:
          type: number
          format: double
        positionSizePercent:
          type: number
          format: double
        tradeCount:
          type: integer
        trades:
          type: array
          items:
            $ref: '#/components/schemas/ExecutedTradeResponse'
      required: [symbol, timeframe, startTime, strategyType, capital, tradeCount, trades]
    PortfolioSimulationRequest:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
          enum: [SMA_CROSS, RSI, MACD]
        shortPeriod:
          type: integer
        longPeriod:
          type: integer
        signalPeriod:
          type: integer
        period:
          type: integer
        overbought:
          type: number
          format: double
        oversold:
          type: number
          format: double
        commissionRate:
          type: number
          format: double
        slippageRate:
          type: number
          format: double
        positionSizePercent:
          type: number
          format: double
        capital:
          type: number
          format: double
      required: [symbol, timeframe, startTime, strategyType, positionSizePercent, capital]
    EquityCurvePointResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        equity:
          type: number
          format: double
        openPosition:
          type: boolean
        openPositionPnl:
          type: number
          format: double
      required: [timestamp, equity]
    EquityCurveResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/EquityCurvePointResponse'
      required: [points]
    PortfolioStatsResponse:
      type: object
      properties:
        initialCapital:
          type: number
          format: double
        finalEquity:
          type: number
          format: double
        totalReturn:
          type: number
          format: double
        totalReturnPercent:
          type: number
          format: double
        tradeCount:
          type: integer
      required: [initialCapital, finalEquity, totalReturn, totalReturnPercent, tradeCount]
    CandleSnapshotResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        balance:
          type: number
          format: double
        cash:
          type: number
          format: double
        tradeProfit:
          type: number
          format: double
        tradeNumber:
          type: integer
      required: [timestamp, balance, cash, tradeProfit, tradeNumber]
    PortfolioSimulationResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        strategyType:
          type: string
        capital:
          type: number
          format: double
        commissionRate:
          type: number
          format: double
        slippageRate:
          type: number
          format: double
        positionSizePercent:
          type: number
          format: double
        tradeCount:
          type: integer
        equityCurve:
          $ref: '#/components/schemas/EquityCurveResponse'
        stats:
          $ref: '#/components/schemas/PortfolioStatsResponse'
      required: [symbol, timeframe, startTime, strategyType, capital, tradeCount, equityCurve, stats]
    MetricsSimulationRequest:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: '#/components/schemas/ExecutedTradeResponse'
        equityCurve:
          $ref: '#/components/schemas/EquityCurveResponse'
        stats:
          $ref: '#/components/schemas/PortfolioStatsResponse'
      required: [trades, equityCurve, stats]
    MetricsSimulationResponse:
      type: object
      properties:
        initialCapital:
          type: number
          format: double
        finalBalance:
          type: number
          format: double
        totalReturnPercent:
          type: number
          format: double
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        averageWin:
          type: number
          format: double
        averageLoss:
          type: number
          format: double
        bestTrade:
          type: number
          format: double
        worstTrade:
          type: number
          format: double
        maxConsecutiveWins:
          type: integer
        maxConsecutiveLosses:
          type: integer
        expectancy:
          type: number
          format: double
        rewardRiskRatio:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
        recoveryFactor:
          type: number
          format: double
        sharpeRatio:
          type: number
          format: double
        sortinoRatio:
          type: number
          format: double
        calmarRatio:
          type: number
          format: double
        cagr:
          type: number
          format: double
      required: [initialCapital, finalBalance, totalReturnPercent, totalTrades, winningTrades, losingTrades, winRate, profitFactor, averageWin, averageLoss, bestTrade, worstTrade, maxConsecutiveWins, maxConsecutiveLosses, expectancy, rewardRiskRatio, maxDrawdown, recoveryFactor, sharpeRatio, sortinoRatio, calmarRatio, cagr]
