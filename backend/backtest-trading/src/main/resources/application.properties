server.port=8081

# ==========================================
# DATABASE - H2 (Development)
# Uncomment MySQL config for production
# ==========================================
spring.datasource.url=jdbc:h2:mem:backtestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (access at http://localhost:8081/h2-console)
spring.h2.console.enabled=true

# ==========================================
# DATABASE - MySQL (Production)
# ==========================================
# spring.datasource.url=jdbc:mysql://127.0.0.1:3306/backtest_trading_system?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=24022005
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# ==========================================
# JWT
# ==========================================
app.jwt.secret=YOUR_256_BIT_JWT_SECRET_KEY_REPLACE_THIS_IN_PRODUCTION
app.jwt.expiration-ms=86400000

# ==========================================
# Misc
# ==========================================
spring.jackson.serialization.indent_output=true

# ==========================================
# OpenAPI / Swagger
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.enable-auto-violation=true